<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>CaterConnect - Workers</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0; padding: 0;
      background: #f8f8f8;
    }
    header {
      background: #ff4d4d;
      color: white;
      padding: 15px;
      text-align: center;
      font-size: 1.5em;
    }
    .workers-container {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      padding: 20px;
      gap: 20px;
      overflow-y: auto;
      max-height: 80vh;
    }
    .worker-card {
      background: white;
      border-radius: 10px;
      box-shadow: 0 4px 8px rgba(0,0,0,0.1);
      width: 250px;
      padding: 15px;
      text-align: center;
      transition: transform 0.2s;
    }
    .worker-card:hover {
      transform: scale(1.05);
    }
    .worker-card h3 {
      margin: 10px 0;
      color: #333;
    }
    .worker-card p {
      margin: 5px 0;
      color: #666;
    }
    .hire-btn {
      background: #ff4d4d;
      color: white;
      border: none;
      padding: 10px 15px;
      border-radius: 5px;
      cursor: pointer;
      margin-top: 10px;
    }
    .hire-btn:hover {
      background: #e63939;
    }
  </style>
</head>
<body>
  <header>👨‍🍳 CaterConnect Workers</header>
  <div class="workers-container">
    <!-- Example Worker Card -->
    <div class="worker-card">
      <h3>Ramesh Kumar</h3>
      <p>🍴 Catering Professional</p>
      <p>📱 +91 9876543210</p>
      <p>📍 Chennai</p>
      <p>💼 5 Years Experience</p>
      <button class="hire-btn">Hire Now</button>
    </div>
    <!-- Repeat cards dynamically with your backend loop -->
  </div>
</body>
</html>
