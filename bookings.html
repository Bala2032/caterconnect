<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>CaterConnect - Bookings</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0; padding: 0;
      background: #f8f8f8;
    }
    header {
      background: #ff4d4d;
      color: white;
      padding: 15px;
      text-align: center;
      font-size: 1.5em;
    }
    .bookings-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
      gap: 20px;
      overflow-y: auto;
      max-height: 80vh;
    }
    .booking-card {
      background: white;
      border-radius: 10px;
      box-shadow: 0 4px 8px rgba(0,0,0,0.1);
      width: 80%;
      padding: 15px;
      transition: transform 0.2s;
    }
    .booking-card:hover {
      transform: scale(1.02);
    }
    .booking-card h3 {
      margin: 10px 0;
      color: #333;
    }
    .booking-card p {
      margin: 5px 0;
      color: #666;
    }
    .status {
      font-weight: bold;
      color: #28a745;
    }
  </style>
</head>
<body>
  <header>📅 CaterConnect Bookings</header>
  <div class="bookings-container">
    <!-- Example Booking Card -->
    <div class="booking-card">
      <h3>Wedding Reception</h3>
      <p>👤 Client: Priya Sharma</p>
      <p>📍 Location: Madurai</p>
      <p>📅 Date: 25 March 2026</p>
      <p class="status">Status: Confirmed ✅</p>
    </div>
    <!-- Repeat dynamically for each booking -->
  </div>
</body>
</html>
